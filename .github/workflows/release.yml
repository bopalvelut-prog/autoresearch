name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate changelog
        id: changelog
        run: |
          echo "## AutoResearch $(git describe --tags --abbrev=0)" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Recent experiments" >> CHANGELOG.md
          if [ -f experiment_log.txt ]; then
            tail -5 experiment_log.txt >> CHANGELOG.md
          fi
          echo "changelog_generated=true" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            train.py
            agent.py
            prepare.py
            program.md
          generate_release_notes: true
